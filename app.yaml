# Databricks App — FastAPI serves REST API + static SPA from frontend/dist
# Build frontend before deploy: cd frontend && npm ci && npm run build
command:
  - "python"
  - "-m"
  - "uvicorn"
  - "main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "$DATABRICKS_APP_PORT"

env:
  - name: USE_CASE
    value: capita_tfl
  - name: UC_CATALOG
    value: ss_kibbim_azure_stable
  - name: UC_SCHEMA
    value: capita_tfl_demo
  - name: DATABRICKS_WAREHOUSE_ID
    value: c184130100ab98c7
  - name: LAKEBASE_PROJECT
    value: capita-tfl-analytics-pg
  - name: LAKEBASE_BRANCH
    value: production
  - name: LAKEBASE_ENDPOINT_ID
    value: primary
  - name: LAKEBASE_DATABASE
    value: chat_memory
  - name: LAKEBASE_HOST
    value: ep-little-leaf-e1nicyb4.database.eastus2.azuredatabricks.net
  - name: APP_NAME
    value: Capita TfL Analytics
  - name: APP_LOGO_URL
    value: /logo.png
