# Databricks Asset Bundle — Capita TfL Adaptive Leader Intelligence (Databricks App)
# Validate: databricks bundle validate
# Deploy:   databricks bundle deploy --target default

bundle:
  name: capita_tfl_analytics

targets:
  default:
    mode: development
    default: true
    workspace:
      host: https://adb-7405615099217484.4.azuredatabricks.net
      profile: azure_demo
    resources:
      apps:
        capita_tfl_analytics:
          name: capita-tfl-analytics
          description: Capita TfL contract intelligence demo (React + Python).
          source_code_path: .
          # Requires frontend/dist (commit it, or build via .github/workflows/build-frontend.yml artifact).
          # In the workspace App settings, set DATABRICKS_WAREHOUSE_ID for KPIs + leader_profiles.
          config:
            env:
              - name: USE_CASE
                value: capita_tfl
              - name: UC_CATALOG
                value: ss_kibbim_azure_stable
              - name: UC_SCHEMA
                value: capita_tfl_demo
              - name: DATABRICKS_WAREHOUSE_ID
                value: c184130100ab98c7
              - name: LAKEBASE_PROJECT
                value: capita-tfl-analytics-pg
              - name: LAKEBASE_BRANCH
                value: production
              - name: LAKEBASE_ENDPOINT_ID
                value: primary
              - name: LAKEBASE_DATABASE
                value: chat_memory
              - name: LAKEBASE_HOST
                value: ep-little-leaf-e1nicyb4.database.eastus2.azuredatabricks.net
              # ---- Branding (optional, override at any time without code changes) ----
              # APP_NAME shows in the browser tab title and (when no logo is set) in the header.
              - name: APP_NAME
                value: Capita TfL Analytics
              # APP_LOGO_URL: set to a relative path (e.g. /logo.png after dropping a file
              # into frontend/public/ and rebuilding) OR an absolute URL to an external asset.
              # Leave blank to hide the logo.
              - name: APP_LOGO_URL
                value: /logo.png
              # Optional separate dark-mode logo (falls back to APP_LOGO_URL if unset).
              - name: APP_LOGO_URL_DARK
                value: ""
